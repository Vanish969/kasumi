<script>

function startTypingLoop(){
const text="CHEATER AKO WAG TULARAN.";
const el=document.getElementById("typing");
let i=0,deleting=false;

function loop(){
if(!deleting){
el.textContent=text.substring(0,i++);
if(i>text.length){deleting=true;setTimeout(loop,1200);return;}
}else{
el.textContent=text.substring(0,i--);
if(i===0){deleting=false;}
}
setTimeout(loop,deleting?50:90);
}
loop();
}

const warning=document.getElementById("skidWarning");

function showWarning(){warning.style.display="flex";}
function closeWarning(){warning.style.display="none";}

document.addEventListener("contextmenu",function(e){e.preventDefault();showWarning();});
let pressTimer;
document.addEventListener("touchstart",function(){pressTimer=setTimeout(showWarning,600);});
document.addEventListener("touchend",function(){clearTimeout(pressTimer);});
document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.shiftKey && e.key==="I"){e.preventDefault();showWarning();}

if(e.ctrlKey && e.key==="U"){e.preventDefault();showWarning();}
});

const canvas = document.getElementById("trailCanvas");
const ctx = canvas.getContext("2d");

let SCALE = window.devicePixelRatio || 1;

function resizeCanvas(){
canvas.width = window.innerWidth * SCALE;
canvas.height = window.innerHeight * SCALE;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let trail = [];
const maxTrail = 40;

document.addEventListener("mousemove", e=>{
trail.push({
x: e.clientX * SCALE,
y: e.clientY * SCALE,
vx: (Math.random()-0.5)*1.5,
vy: (Math.random()-0.5)*1.5,
r: Math.random()*3+1,
life: 1,
decay: 0.02
});
});


function drawTrail() {
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.shadowColor = 'rgba(255,255,255,0.8)';
ctx.shadowBlur = 6 * SCALE;

let active = 0;

for (const p of trail) {
if (p.life <= 0) continue;

active++;

p.x += p.vx;
p.y += p.vy;
p.vy += 0.01;

p.life -= p.decay;
p.scale = Math.max(0, p.life);

ctx.globalAlpha = p.life;
ctx.fillStyle = '#ffffff';

ctx.beginPath();
ctx.arc(p.x, p.y, p.r * p.scale, 0, Math.PI * 2);
ctx.fill();

if (active > maxTrail) break;
}

ctx.shadowBlur = 0;
ctx.globalAlpha = 1;
}

function animateTrail(){
drawTrail();
requestAnimationFrame(animateTrail);
}
animateTrail();

</script>
